<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Мой сайт</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
padding:20px;
}

.block{
background:white;
padding:15px;
margin:10px auto;
max-width:300px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
margin-bottom:10px;
}
</style>

</head>
<body>

<div class="block">
<h2 id="calDate"></h2>
<div id="calHoliday"></div>
<div id="calDesc"></div>
</div>

<div class="block">
<h2 class="timer-title"></h2>
<div id="daysLeft"></div>
<div class="timer-sub"></div>
</div>

<div class="block">
<h2>Погода</h2>
<div id="wIcon" style="font-size:30px"></div>
<div id="wTemp"></div>
<div id="wWind"></div>
<div id="wDesc"></div>
</div>

<div class="block">
<h2>Совет</h2>
<div id="moonAdvice"></div>
</div>

<script>

// КАЛЕНДАРЬ
function updateCalendar(){
const date=new Date();

const options={month:'long',day:'numeric',weekday:'long'};
document.getElementById('calDate').innerText=
date.toLocaleDateString('ru-RU',options);

const day=date.getDate();
const month=date.getMonth()+1;
const key=day+"-"+month;

const holidays={
"7-1":"Рождество Христово",
"19-1":"Крещение Господне",
"7-4":"Благовещение",
"20-4":"Пасха",
"8-6":"Троица",
"14-10":"Покров",
"4-11":"Казанская",
"31-12":"Канун Нового года"
};

if(holidays[key]){
document.getElementById('calHoliday').innerText=
"Сегодня праздник: "+holidays[key];
document.getElementById('calDesc').innerText=
"С праздником!";
}else{
document.getElementById('calHoliday').innerText=
"Обычный день";
document.getElementById('calDesc').innerText=
"Хороший день для дел.";
}
}
updateCalendar();


// ТАЙМЕР
function updateTimer(){

const today=new Date();
let year=today.getFullYear();

let holidays=[
{name:"Новый год",date:new Date(year,11,31)}
];

let nextHoliday=holidays[0];

let diff=Math.ceil(
(nextHoliday.date-today)/(1000*60*60*24)
);

document.getElementById('daysLeft').innerText=
"До Нового года: "+diff+" дней";

document.querySelector('.timer-title').innerText=
"🎉 Ближайший праздник";

document.querySelector('.timer-sub').innerText=
"Новый год";
}
updateTimer();


// ПОГОДА
function getWeatherIcon(code){
if(code===0)return "☀";
if(code<=3)return "⛅";
if(code<=67)return "🌧";
if(code<=77)return "❄";
return "☁";
}

async function getWeather(){
try{
const r=await fetch(
'https://api.open-meteo.com/v1/forecast?latitude=59.20&longitude=68.68&current_weather=true&timezone=auto'
);

const data=await r.json();

document.getElementById('wTemp').innerText=
Math.round(data.current_weather.temperature)+"°";

document.getElementById('wWind').innerText=
"Ветер "+Math.round(data.current_weather.windspeed/3.6)+" м/с";

document.getElementById('wIcon').innerText=
getWeatherIcon(data.current_weather.weathercode);

document.getElementById('wDesc').innerText=
"Прогноз";
}
catch{
document.getElementById('wDesc').innerText=
"Нет связи";
}
}
getWeather();


// СОВЕТ
function getGardenAdvice(){
let m=new Date().getMonth()+1;
let advice="";

if(m<=2) advice="❄ Планируйте посадки";
else if(m<=4) advice="🌱 Время рассады";
else if(m<=6) advice="🌿 Посадка и уход";
else if(m<=8) advice="🍓 Сбор урожая";
else if(m<=10) advice="🍂 Подготовка к зиме";
else advice="🌙 Отдых";

document.getElementById('moonAdvice').innerText=advice;
}
getGardenAdvice();

</script>

</body>
</html>
